<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ganga Maxx - Staff Router</title>
  <script>
    // Automatically redirect staff based on their sub-role
    const userStr = localStorage.getItem('currentUser');
    if (!userStr) {
      window.location.href = '/pages/login.html';
    } else {
      const user = JSON.parse(userStr);
      if (user.role !== 'staff' && user.role !== 'admin') {
        window.location.href = '/pages/login.html';
      } else if (user.status !== 'active') {
        if (window.toast) window.toast.show('Your account is currently inactive. Redirecting to login.', "info"); else alert('Your account is currently inactive. Redirecting to login.');
        localStorage.removeItem('currentUser');
        window.location.href = '/pages/login.html';
      } else {
        // Fallback for full admin is Sales Admin Dashboard
        const subRole = user.subRole || (user.role === 'admin' ? 'sales_admin' : '');
        const roleLower = subRole.toLowerCase();
        
        if (roleLower.includes('salesman')) {
          window.location.href = '/pages/staff/salesman.html';
        } else if (roleLower.includes('sales_admin') || roleLower.includes('salesadmin') || user.role === 'admin') {
          window.location.href = '/pages/staff/sales-admin.html';
        } else if (roleLower.includes('warehouse')) {
          window.location.href = '/pages/staff/warehouse.html';
        } else if (roleLower.includes('delivery')) {
          window.location.href = '/pages/staff/delivery.html';
        } else if (roleLower.includes('accounts')) {
          window.location.href = '/pages/staff/accounts.html';
        } else if (roleLower.includes('compliance')) {
          window.location.href = '/pages/staff/compliance.html';
        } else {
          // Default fallback
          window.location.href = '/pages/staff/salesman.html';
        }
      }
    }
  </script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300A651' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z'/><path d='M3 6h18'/><path d='M16 10a4 4 0 0 1-8 0'/></svg>">
  <link rel="stylesheet" href="/css/print.css">
  <!-- Importmap for standard Firebase resolve in browser -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
      }
    }
  </script>
</head>
<body>
  <div style="font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column;">
    <h2>Ganga Maxx Portal</h2>
    <p>Routing to your role workspace...</p>
  </div>
<script src="/components/chat-widget.js"></script>
  <script src="/js/toast.js"></script>
  <script type="module" src="/js/ui.js"></script>
  <script type="module">
    import { initNotifications } from "/js/notifications.js";
    const currentUser = JSON.parse(localStorage.getItem("currentUser"));
    if (currentUser && currentUser.uid) initNotifications(currentUser.uid);
  </script>
</body>
</html>
