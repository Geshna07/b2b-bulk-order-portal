<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Ganga Maxx</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300A651' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z'/><path d='M3 6h18'/><path d='M16 10a4 4 0 0 1-8 0'/></svg>">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { green: '#00A651', dark: '#1a1a1a', light: '#f5f5f5' }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/css/print.css">
  <!-- Importmap for standard Firebase resolve in browser -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"
      }
    }
  </script>
</head>
<body class="bg-brand-light flex items-center justify-center min-h-screen p-4 font-sans text-brand-dark">
  <div class="bg-white p-8 sm:p-12 rounded-2xl shadow-sm border border-slate-200 text-center max-w-md w-full">
    <div class="w-20 h-20 bg-brand-green/10 rounded-full flex items-center justify-center mx-auto mb-6">
      <i data-lucide="file-question" class="w-10 h-10 text-brand-green"></i>
    </div>
    <h1 class="text-4xl font-bold mb-2">404</h1>
    <h2 class="text-xl font-semibold mb-4 text-slate-800">Page Not Found</h2>
    <p class="text-slate-500 mb-8 text-sm">The page you are looking for doesn't exist or has been moved.</p>
    
    <button onclick="window.history.back()" class="w-full bg-brand-green hover:bg-brand-green/90 text-white font-medium py-3 rounded-xl transition-all shadow-sm mb-3">
      Go Back
    </button>
    <a href="/pages/login.html" class="block w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-3 rounded-xl transition-all">
      Go to Login
    </a>
  </div>
  <script>lucide.createIcons();</script>
  <script src="/js/toast.js"></script>
  <script type="module" src="/js/ui.js"></script>
</body>
</html>
